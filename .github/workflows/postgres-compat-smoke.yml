name: Postgres Compatibility Smoke

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  postgres-compat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run Postgres compatibility checks
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PGSSLMODE: require
        run: npm run test:postgres-compat
        working-directory: backend
