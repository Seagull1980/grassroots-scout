name: Post-Deploy Smoke Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      smoke_base_url:
        description: 'Override base URL for smoke tests'
        required: false
        type: string

jobs:
  smoke-test:
    name: Run team management smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for Vercel & Railway deploy propagation
        run: sleep 120

      - name: Resolve smoke configuration
        id: smoke-config
        shell: bash
        env:
          INPUT_SMOKE_BASE_URL: ${{ inputs.smoke_base_url }}
          VAR_SMOKE_BASE_URL: ${{ vars.SMOKE_BASE_URL }}
          SECRET_SMOKE_TOKEN: ${{ secrets.SMOKE_TOKEN }}
        run: |
          set -euo pipefail

          BASE_URL="${INPUT_SMOKE_BASE_URL:-}"
          if [[ -z "$BASE_URL" ]]; then
            BASE_URL="${VAR_SMOKE_BASE_URL:-}"
          fi

          BASE_URL="${BASE_URL%/}"

          if [[ -z "$BASE_URL" ]]; then
            echo "::warning::Skipping post-deploy smoke tests because SMOKE_BASE_URL is not configured (workflow input or repository variable)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ -z "${SECRET_SMOKE_TOKEN:-}" ]]; then
            echo "::warning::Skipping post-deploy smoke tests because secret SMOKE_TOKEN is not configured."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "base_url=$BASE_URL" >> "$GITHUB_OUTPUT"

      - name: Run team management smoke tests
        if: ${{ steps.smoke-config.outputs.enabled == 'true' }}
        env:
          SMOKE_BASE_URL: ${{ steps.smoke-config.outputs.base_url }}
          SMOKE_TOKEN: ${{ secrets.SMOKE_TOKEN }}
          SMOKE_TIMEOUT_MS: '20000'
        run: node backend/scripts/smoke-team-management.js

      - name: Smoke tests skipped
        if: ${{ steps.smoke-config.outputs.enabled != 'true' }}
        run: echo "::notice::Post-deploy smoke checks were skipped due to missing smoke configuration."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke tests failed after deploy to main. Check the logs above for which endpoint failed."
          echo "::notice::If this is a new deploy, it may just need more time. Re-run this job manually after a few minutes."
