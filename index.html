<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>The Grassroots Scout - Find Football Teams &amp; Players Near You</title>
    <meta name="description" content="The Grassroots Scout connects grassroots football players with local teams across the UK. Browse team vacancies, post player availability, and find your perfect match." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.thegrassrootshub.co.uk/" />

    <!-- Open Graph (social sharing) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="The Grassroots Scout" />
    <meta property="og:title" content="The Grassroots Scout - Find Football Teams &amp; Players Near You" />
    <meta property="og:description" content="Connect with grassroots football teams and players across the UK. Post vacancies, find players, and grow the beautiful game." />
    <meta property="og:url" content="https://www.thegrassrootshub.co.uk/" />
    <meta property="og:image" content="https://www.thegrassrootshub.co.uk/logo-scout.svg" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="The Grassroots Scout - Find Football Teams &amp; Players Near You" />
    <meta name="twitter:description" content="Connect with grassroots football teams and players across the UK." />
    <meta name="twitter:image" content="https://www.thegrassrootshub.co.uk/logo-scout.svg" />

    <!-- PWA / Browser -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0066FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Grassroots Scout" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/logo.jpg" />

    <!-- Fonts — preconnect to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "The Grassroots Scout",
      "url": "https://www.thegrassrootshub.co.uk/",
      "description": "Connecting grassroots football players with local teams across the UK.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.thegrassrootshub.co.uk/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "The Grassroots Scout",
        "url": "https://www.thegrassrootshub.co.uk/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://www.thegrassrootshub.co.uk/logo-scout.svg"
        }
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
